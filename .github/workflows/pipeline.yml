name: Assignment 5 ML Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      force_accuracy:
        description: "Optional accuracy override for demo runs (e.g., 0.80 or 0.90)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.10"
  WORKING_DIR: "."

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: assignment5_pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn

      - name: Train model and log to MLflow
        env:
          FORCE_ACCURACY: ${{ inputs.force_accuracy }}
        run: python train.py

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          if-no-files-found: error

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          if-no-files-found: error

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Download MLflow runs
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Build Docker image (mock)
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
